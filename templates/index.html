<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token }}" />
    <title>EPUB to Audiobook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>

    <header class="header">
      <div class="header-inner">
        <h1 class="header-title">EPUB to Audiobook</h1>
        <div class="header-device">
          <span>Device:</span>
          <span id="detectedDevice" class="device-chip">{{ detected_device }}</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- Left column: controls -->
      <div class="col-controls">

        <!-- Step 1: Upload -->
        <div class="card">
          <h2 class="card-title">1. Choose Your EPUB</h2>
          <label id="dropZone" for="epubFile" class="drop-zone" tabindex="0" role="button" aria-label="Click or drag an EPUB file here">
            <svg class="drop-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="drop-primary">Click to upload or drag an EPUB here</p>
            <p class="drop-secondary">Only .epub files are accepted</p>
            <input id="epubFile" type="file" accept=".epub" />
          </label>
          <div class="upload-meta">
            <div id="detectedTitleField">Title: <strong><span id="detectedTitle">None</span></strong></div>
            <div id="estimatedFiles">Files: ?</div>
          </div>
        </div>

        <!-- Step 2: Settings -->
        <div class="card">
          <h2 class="card-title">2. Settings</h2>
          <div class="form-grid">
            <div>
              <label class="field-label" for="outputName">Output Name</label>
              <input id="outputName" type="text" value="audiobook" placeholder="audiobook" />
            </div>
            <div>
              <label class="field-label" for="voiceSelect">Voice</label>
              <select id="voiceSelect">
                {% for voice in voices %}
                <option value="{{ voice }}">{{ voice }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-full">
              <label class="field-label" for="outputDir">Output Directory</label>
              <input id="outputDir" type="text" value="{{ default_output_dir }}" />
            </div>
            <div class="form-full">
              <label class="field-label" for="filterLevel">Front Matter Filter</label>
              <select id="filterLevel">
                <option value="default" selected>Default — Skip common front/back matter (recommended)</option>
                <option value="conservative">Conservative — Only remove obvious TOC pages</option>
                <option value="aggressive">Aggressive — Also skip introductions and notes</option>
                <option value="off">Off — Include everything as-is</option>
              </select>
            </div>
            <div class="form-full">
              <label class="field-label">Generation Mode</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="mode" value="single" checked />
                  <span>Single File <span class="field-hint">— one continuous audiobook</span></span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="mode" value="chapter" />
                  <span>By Chapter <span class="field-hint">— separate file per chapter</span></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Generate -->
        <button id="generateButton" class="btn-generate" disabled>
          Generate Audiobook
        </button>

      </div>

      <!-- Right column: status + files -->
      <div class="col-status">

        <!-- Status -->
        <div class="card">
          <div class="status-header">
            <h2 class="status-title">Status</h2>
            <span id="statusBadge" class="status-badge idle">Idle</span>
          </div>
          <p id="statusMessage" class="status-message" aria-live="polite">Ready to upload an EPUB</p>
          <div class="progress-track">
            <div id="progressBar" class="progress-fill"></div>
          </div>
          <div id="jobDetails" class="job-details" aria-live="polite"></div>
        </div>

        <!-- Files -->
        <div class="card">
          <div class="files-header">
            <h2 class="card-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">Generated Files</h2>
          </div>
          <div class="files-scroll">
            <ul id="fileList" class="file-list" aria-live="polite">
              <li class="empty">No files generated yet</li>
            </ul>
          </div>
        </div>

      </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    <script>
      // app.js calls byId("progressBar").value = N — intercept that on our div
      const _progressFill = document.getElementById('progressBar');
      if (_progressFill) {
        Object.defineProperty(_progressFill, 'value', {
          set(v) { this.style.width = v + '%'; },
          get() { return parseFloat(this.style.width) || 0; }
        });
      }
    </script>

  </body>
</html>
