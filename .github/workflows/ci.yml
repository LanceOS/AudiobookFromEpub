name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AUDIOBOOK_TEST_MODE: "1"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask

    - name: Run smoke test
      run: python smoke_test.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Playwright and browser deps
      run: |
        cd tests/e2e
        npm ci
        npx playwright install --with-deps

    - name: Run Playwright E2E (starts server then runs tests)
      run: |
        chmod +x tests/e2e/run_server_and_tests.sh
        tests/e2e/run_server_and_tests.sh
