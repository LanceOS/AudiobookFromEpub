name: Branch protection

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply branch protection to main
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.BRANCH_PROTECTION_TOKEN != '' && secrets.BRANCH_PROTECTION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            try {
              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch,
                required_status_checks: {
                  strict: true,
                  contexts: ['CI']
                },
                enforce_admins: true,
                required_pull_request_reviews: {
                  dismissal_restrictions: { users: [], teams: [] },
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: false,
                  required_approving_review_count: 1
                },
                restrictions: null
              });
              console.log(`Applied branch protection to ${owner}/${repo}@${branch}`);
            } catch (err) {
              console.error('Failed to apply branch protection:', err.message || err);
              throw err;
            }
